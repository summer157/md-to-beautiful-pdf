name: Feature Request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is this related to a pain point you have? Describe it here.
      placeholder: "I often need to export PDFs with custom margins but there's no option for that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
      placeholder: "Add a `--margin` option that accepts values like `1in` or `2cm`..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, links, or screenshots.

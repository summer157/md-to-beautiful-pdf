name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `mdpdf input.md --theme purple`, the output PDF is missing..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `mdpdf examples/basic.md --theme purple`
        2. Open the PDF
        3. See that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please fill in the version info below.
      value: |
        - OS:
        - Node.js version (`node -v`):
        - Pandoc version (`pandoc --version`):
        - Typst version (`typst --version`):
        - md-to-beautiful-pdf version (`mdpdf --version`):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any relevant error messages or terminal output here.
      render: shell

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Install Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ^0.14.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare output directory
        run: mkdir -p examples/output

      - name: Smoke test
        run: npm test
